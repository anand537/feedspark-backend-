<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .footer { font-size: 12px; color: #777; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Absence Notification</h2>
        </div>
        <p>Hello {{ student_name }},</p>
        <p>You were marked as <strong>Absent</strong> for the meeting <strong>{{ meeting_title }}</strong> scheduled on {{ meeting_date }}.</p>
        <p>If you believe this is an error, please contact your mentor.</p>
        
        <div class="footer">
            <p>Auto Feedback Generator System</p>
        </div>
    </div>
</body>
</html>
